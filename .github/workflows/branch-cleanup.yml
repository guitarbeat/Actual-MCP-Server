name: Branch Cleanup

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: write
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      STALE_DAYS: '30'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git fetch --all --prune
          MAIN_SHA=$(git rev-parse "origin/$DEFAULT_BRANCH")
          NOW_TS=$(date +%s)
          DELETED=()
          STALE_NO_PR=()
          ACTIVE_WITH_PR=()

          while IFS= read -r remote_ref; do
            branch="${remote_ref#origin/}"

            if [ -z "$branch" ] || [ "$branch" = "$DEFAULT_BRANCH" ]; then
              continue
            fi

            echo "=== Checking: $branch ==="
            BRANCH_SHA=$(git rev-parse "$remote_ref")

            if git merge-base --is-ancestor "$BRANCH_SHA" "$MAIN_SHA"; then
              echo "  Already merged into $DEFAULT_BRANCH, deleting remote branch"
              git push origin --delete "$branch"
              DELETED+=("$branch")
              continue
            fi

            EXISTING_PR=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // empty')
            if [ -n "$EXISTING_PR" ]; then
              echo "  Open PR #$EXISTING_PR exists, leaving branch alone"
              ACTIVE_WITH_PR+=("$branch (PR #$EXISTING_PR)")
              continue
            fi

            LAST_COMMIT_TS=$(git log -1 --format=%ct "$remote_ref")
            AGE_DAYS=$(( (NOW_TS - LAST_COMMIT_TS) / 86400 ))
            if [ "$AGE_DAYS" -ge "$STALE_DAYS" ]; then
              echo "  Unmerged, no PR, stale for $AGE_DAYS days"
              STALE_NO_PR+=("$branch (${AGE_DAYS} days old)")
            else
              echo "  Unmerged, no PR, but only $AGE_DAYS days old"
            fi
          done < <(git for-each-ref --format='%(refname:short)' refs/remotes/origin | grep -vE "^origin/(HEAD|${DEFAULT_BRANCH})$")

          printf 'Deleted merged branches: %d\n' "${#DELETED[@]}"
          printf 'Open PR branches preserved: %d\n' "${#ACTIVE_WITH_PR[@]}"
          printf 'Unmerged stale branches needing review: %d\n' "${#STALE_NO_PR[@]}"

          if [ "${#STALE_NO_PR[@]}" -eq 0 ]; then
            exit 0
          fi

          BODY_FILE=$(mktemp)
          {
            echo "The weekly branch cleanup workflow found unmerged remote branches with no open PR that are older than ${STALE_DAYS} days."
            echo
            echo "Detected on $(date -u '+%Y-%m-%d %H:%M UTC')."
            echo
            echo "## Branches needing manual review"
            for branch in "${STALE_NO_PR[@]}"; do
              echo "- $branch"
            done
            if [ "${#ACTIVE_WITH_PR[@]}" -gt 0 ]; then
              echo
              echo "## Branches left alone because they have open PRs"
              for branch in "${ACTIVE_WITH_PR[@]}"; do
                echo "- $branch"
              done
            fi
          } > "$BODY_FILE"

          ISSUE_TITLE="Branch cleanup: manual review needed"
          EXISTING_ISSUE=$(gh issue list --state open --json number,title --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" | head -n 1)

          if [ -n "$EXISTING_ISSUE" ]; then
            gh issue comment "$EXISTING_ISSUE" --body-file "$BODY_FILE"
          else
            gh issue create --title "$ISSUE_TITLE" --body-file "$BODY_FILE"
          fi
