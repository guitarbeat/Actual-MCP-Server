services:
  - type: web
    name: actual-mcp
    env: docker
    dockerContext: .
    dockerfilePath: mcp-server/Dockerfile
    healthCheckPath: /health
    envVars:
      # Secret pairings (Rendered as sync: false placeholders)
      - key: ACTUAL_SERVER_URL
        sync: false
      - key: ACTUAL_PASSWORD
        sync: false
      - key: ACTUAL_BUDGET_SYNC_ID
        sync: false
      - key: BEARER_TOKEN
        sync: false
      - key: ACTUAL_BUDGET_ENCRYPTION_PASSWORD
        sync: false
    # Optional knobs (omit to fall back to code defaults documented in README + mcp-server/.env.example):
    # - MCP_SESSION_TTL_MINUTES — prune inactive streamable MCP sessions
    # - ACTUAL_CONNECTION_HEALTH_TTL_MS — read idle health TTL for @actual-app/api probing
    # - AUTO_SYNC_INTERVAL_MINUTES — background sync cadence for remote freshness
    # - MCP_ALLOWED_ORIGINS — browser MCP allowlist when NODE_ENV=production
    # - ACTUAL_SESSION_TOKEN — alternative single-factor auth vs ACTUAL_PASSWORD
    # - MCP_TOOL_CORRELATION_LOGS=true — correlate stderr tool executions with HTTP request ids
    # - MCP_CONNECTION_DIAGNOSTICS_INTERVAL_SEC — periodic [MCP_DIAG] lines (RSS, conn state, epoch counters)
    # - MCP_READINESS_TRANSITION_LOGS=true — correlate /ready flips vs 503/200 responses
    # - /reconnect endpoint (POST, bearer-protected) — trigger a forced reconnect on cold starts
