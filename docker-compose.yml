version: '3.8'

services:
  actual-mcp:
    build:
      context: .
      builder: nixpacks
    image: actual-mcp:local
    container_name: actual-mcp-server
    ports:
      - "3000:3000"
    environment:
      - ACTUAL_SERVER_URL=${ACTUAL_SERVER_URL}
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID}
      - AUTO_SYNC_INTERVAL_MINUTES=${AUTO_SYNC_INTERVAL_MINUTES:-5}
      - BEARER_TOKEN=${BEARER_TOKEN}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - PERFORMANCE_LOGGING_ENABLED=${PERFORMANCE_LOGGING_ENABLED:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

